<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beluco — Адмін панель</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#2a7a38;--gd:#1b5226;--gs:#e6f4e8;
  --white:#fff;--cream:#f7f5f0;--char:#181818;--mid:#5a5a5a;
  --border:#e2dfd8;--danger:#e53e3e;--r:12px;--r-sm:8px;
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--char);min-height:100vh}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.login-box{
  background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);
  padding:48px 40px;width:100%;max-width:400px;text-align:center;
}
.login-logo{background:var(--g);color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;letter-spacing:2px;padding:10px 20px;border-radius:var(--r-sm);display:inline-block;margin-bottom:8px}
.login-sub{font-size:12px;color:var(--mid);letter-spacing:1px;text-transform:uppercase;margin-bottom:32px}
.login-box h2{font-family:'Montserrat',sans-serif;font-weight:800;font-size:22px;margin-bottom:24px}
.login-box input{
  width:100%;padding:12px 16px;font-size:15px;font-family:'Inter',sans-serif;
  border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--cream);
  outline:none;text-align:center;letter-spacing:3px;margin-bottom:16px;
  transition:border-color .15s;
}
.login-box input:focus{border-color:var(--g)}
.login-btn{
  width:100%;background:var(--g);color:#fff;border:none;
  padding:14px;font-size:15px;font-weight:700;border-radius:var(--r-sm);
  cursor:pointer;transition:background .15s;
}
.login-btn:hover{background:var(--gd)}
.login-err{color:var(--danger);font-size:13px;margin-top:12px;display:none}

/* ── MAIN LAYOUT ── */
#admin-screen{display:none;min-height:100vh;flex-direction:column}
header{
  background:var(--gd);color:#fff;
  padding:0 28px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.h-logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;display:flex;align-items:center;gap:12px}
.h-badge{background:rgba(255,255,255,.15);font-size:11px;padding:3px 10px;border-radius:50px;letter-spacing:1px}
.logout-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 18px;font-size:13px;font-weight:600;border-radius:var(--r-sm);cursor:pointer;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,.25)}

.admin-body{display:flex;flex:1}

/* sidebar */
aside{
  width:220px;background:var(--white);border-right:1px solid var(--border);
  padding:24px 12px;flex-shrink:0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;font-size:14px;font-weight:500;
  border-radius:var(--r-sm);cursor:pointer;transition:all .15s;
  color:var(--mid);border:none;background:none;width:100%;text-align:left;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--cream);color:var(--char)}
.nav-item.active{background:var(--gs);color:var(--gd);font-weight:600}
.nav-icon{font-size:17px;width:24px;text-align:center}

/* main content */
main{flex:1;padding:32px;max-width:900px}
.tab-content{display:none}
.tab-content.active{display:block}
.tab-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:24px;margin-bottom:28px}

/* ── FORM ── */
.form-card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);padding:28px;margin-bottom:24px}
.form-card h3{font-size:15px;font-weight:700;margin-bottom:20px;color:var(--gd)}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;padding:10px 14px;font-size:14px;font-family:'Inter',sans-serif;
  border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--cream);
  outline:none;transition:border-color .15s;resize:vertical;
}
.field input:focus,.field textarea:focus{border-color:var(--g)}
.field textarea{min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* photo upload */
.photo-upload{
  border:2px dashed var(--border);border-radius:var(--r-sm);
  padding:28px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
.photo-upload:hover{border-color:var(--g);background:var(--gs)}
.photo-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-upload-icon{font-size:32px;margin-bottom:8px}
.photo-upload-text{font-size:13px;color:var(--mid)}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:var(--r-sm);margin-top:12px;display:none}

.btn-submit{
  background:var(--g);color:#fff;border:none;
  padding:12px 32px;font-size:14px;font-weight:700;border-radius:var(--r-sm);
  cursor:pointer;transition:background .15s;
}
.btn-submit:hover{background:var(--gd)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

  .btn-edit{
  background:none;border:1.5px solid var(--border);color:var(--mid);
  padding:6px 14px;font-size:13px;border-radius:var(--r-sm);cursor:pointer;
  transition:all .15s;flex-shrink:0;margin-right:6px;
}
.btn-edit:hover{background:var(--g);border-color:var(--g);color:#fff}
.editing-badge{
  display:inline-block;background:#fff3cd;color:#856404;
  font-size:12px;font-weight:600;padding:4px 12px;border-radius:50px;
  margin-bottom:16px;
}
/* ── ITEM LIST ── */
.item-list{display:flex;flex-direction:column;gap:10px}
.item-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  transition:border-color .15s;
}
.item-card:hover{border-color:var(--g)}
.item-thumb{
  width:56px;height:56px;border-radius:8px;object-fit:cover;
  background:var(--gs);display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1}
.item-title{font-weight:600;font-size:14px}
.item-sub{font-size:12px;color:var(--mid);margin-top:2px}
.btn-del{
  background:none;border:1.5px solid var(--border);color:var(--mid);
  padding:6px 14px;font-size:13px;border-radius:var(--r-sm);cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.btn-del:hover{background:var(--danger);border-color:var(--danger);color:#fff}

/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.settings-grid,.field-row{grid-template-columns:1fr}}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--gd);color:#fff;padding:12px 28px;border-radius:50px;
  font-weight:600;font-size:14px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.2);
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast.show{opacity:1}

/* empty */
.empty{text-align:center;padding:40px;color:var(--mid)}
.empty-icon{font-size:40px;margin-bottom:12px}

@media(max-width:768px){
  aside{display:none}
  main{padding:16px}
  .mobile-nav{display:flex}
}

  .mob-tab{
  white-space:nowrap;padding:8px 16px;font-size:13px;font-weight:600;
  border-radius:50px;border:1.5px solid var(--border);background:none;
  cursor:pointer;color:var(--mid);transition:all .15s;flex-shrink:0;
}
.mob-tab.active,.mob-tab:hover{background:var(--g);color:#fff;border-color:var(--g)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">BELUCO</div>
    <div class="login-sub">Адміністрування</div>
    <h2>Вхід в панель</h2>
    <input type="password" id="pass-input" placeholder="Введіть пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Увійти</button>
    <div class="login-err" id="login-err">Невірний пароль</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen" style="display:none;flex-direction:column">
  <header>
    <div class="h-logo">
      BELUCO <span class="h-badge">Адмін</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <a href="index.html" target="_blank" style="color:rgba(255,255,255,.7);font-size:13px;text-decoration:none">↗ Переглянути сайт</a>
      <button class="logout-btn" onclick="logout()">Вийти</button>
    </div>
  </header>
<div class="mobile-nav" style="display:none;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border);padding:8px 16px;gap:8px;position:sticky;top:62px;z-index:99">
  <button class="mob-tab active" onclick="switchTab('vacancies',this)">💼 Вакансії</button>
  <button class="mob-tab" onclick="switchTab('news',this)">📰 Новини</button>
  <button class="mob-tab" onclick="switchTab('contests',this)">🏆 Конкурси</button>
  <button class="mob-tab" onclick="switchTab('settings',this)">⚙️ Налаштування</button>
</div>
  <div class="admin-body">
    <aside>
      <button class="nav-item active" onclick="switchTab('vacancies',this)"><span class="nav-icon">💼</span>Вакансії</button>
      <button class="nav-item" onclick="switchTab('news',this)"><span class="nav-icon">📰</span>Новини</button>
      <button class="nav-item" onclick="switchTab('contests',this)"><span class="nav-icon">🏆</span>Конкурси</button>
      <button class="nav-item" onclick="switchTab('settings',this)"><span class="nav-icon">⚙️</span>Налаштування</button>
    </aside>

    <main>
      <!-- VACANCIES -->
        <div class="tab-content active" id="tab-vacancies">
      <div class="form-card">
  <h3>+ Додати вакансію</h3>
  <div class="field-row">
    <div class="field"><label>Назва посади</label><input id="v-title" placeholder="напр. Швачка"></div>
    <div class="field"><label>Іконка (emoji)</label><input id="v-emoji" placeholder="🧵" style="width:80px"></div>
  </div>
  <div class="field"><label>Короткий опис (для картки)</label><textarea id="v-desc" placeholder="1-2 речення..."></textarea></div>
  <div class="field"><label>Детальний опис (відкривається при кліку)</label><textarea id="v-details" placeholder="Обов'язки, вимоги, умови праці, зарплата..." style="min-height:120px"></textarea></div>
  <div class="field">
  <label>Посилання на фото з Гугл Диску (необов'язково)</label>
  <input id="v-image" placeholder="Встав посилання на фото тут...">
  </div>
        
  <button class="btn-submit" onclick="addVacancy()">Додати вакансію</button>
      </div>
      <div class="item-list" id="vacancy-list"></div>
      </div>

      

      <!-- NEWS -->
      <div class="tab-content" id="tab-news">
        <div class="tab-title">📰 Новини</div>
        <div class="form-card">
          <h3>+ Додати новину</h3>
          <div class="field"><label>Заголовок</label><input id="n-title" placeholder="Заголовок новини"></div>
          <div class="field"><label>Текст</label><textarea id="n-text" placeholder="Короткий опис..."></textarea></div>
          <div class="field-row">
            <div class="field"><label>Дата публікації</label><input id="n-date" type="date"></div>
          </div>
          <div class="field">
  <label>Посилання на фото з Гугл Диску (необов'язково)</label>
  <input id="n-image" placeholder="Встав посилання на фото тут...">
          </div>
          
          <button class="btn-submit" onclick="addPost('news')">Додати новину</button>
        </div>
        <div class="item-list" id="news-list"></div>
      </div>

      <!-- CONTESTS -->
      <div class="tab-content" id="tab-contests">
        <div class="tab-title">🏆 Конкурси</div>
        <div class="form-card">
          <h3>+ Додати конкурс</h3>
          <div class="field"><label>Назва конкурсу</label><input id="ct-title" placeholder="напр. Кращий майстер місяця"></div>
          <div class="field"><label>Умови та призи</label><textarea id="ct-text" placeholder="Умови участі, призи, деталі..."></textarea></div>
          <div class="field-row">
            <div class="field"><label>Дедлайн</label><input id="ct-date" type="date"></div>
          </div>
          <div class="field">
  <label>Посилання на фото з Гугл Диску (необов'язково)</label>
  <input id="ct-image" placeholder="Встав посилання на фото тут...">
          </div>

          <button class="btn-submit" onclick="addPost('contest')">Додати конкурс</button>
        </div>
        <div class="item-list" id="contest-list"></div>
      </div>

      <!-- SETTINGS -->
      <div class="tab-content" id="tab-settings">
        <div class="tab-title">⚙️ Налаштування</div>
        <div class="form-card">
          <h3>Контактна інформація</h3>
          <div class="settings-grid">
            <div class="field"><label>Телефон</label><input id="s-phone" placeholder="+38 (050) 000-00-00"></div>
            <div class="field"><label>Email</label><input id="s-email" placeholder="hr@beluco.ua"></div>
            <div class="field"><label>Адреса</label><input id="s-addr" placeholder="вул. Промислова 1, м. Київ"></div>
            <div class="field"><label>Години прийому</label><input id="s-hours" placeholder="Пн–Пт, 09:00 – 17:00"></div>
          </div>
        </div>
        <div class="form-card">
          <h3>Статистика на головній</h3>
          <div class="settings-grid">
            <div class="field"><label>Років на ринку</label><input id="s-years" placeholder="10+"></div>
            <div class="field"><label>Кількість працівників</label><input id="s-staff" placeholder="100+"></div>
          </div>
        </div>
        <button class="btn-submit" onclick="saveSettings()">Зберегти налаштування</button>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let TOKEN = localStorage.getItem('beluco_token') || '';

// ── AUTH ──
async function doLogin() {
  const pass = document.getElementById('pass-input').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pass})
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    TOKEN = data.token;
    localStorage.setItem('beluco_token', TOKEN);
    showAdmin();
  } catch(e) {
    errEl.textContent = 'Невірний пароль: ' + (e.message || '');
    errEl.style.display = 'block';
  }
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('beluco_token');
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function authHeader() {
  return { 'Authorization': 'Bearer ' + TOKEN };
}

// auto-login if token exists
if (TOKEN) {
  fetch('/api/vacancies', {headers: authHeader()})
    .then(r => { if(r.ok) showAdmin(); })
    .catch(() => {});
}
function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'flex';
  loadAll();
}

// ── UI ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item,.mob-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#e53e3e' : 'var(--gd)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  const prev = document.getElementById(previewId);
  if (!file) { prev.style.display = 'none'; return; }
  const reader = new FileReader();
  reader.onload = e => { prev.src = e.target.result; prev.style.display = 'block'; };
  reader.readAsDataURL(file);
}

function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p.length === 3 ? p[2]+'.'+p[1]+'.'+p[0] : d;
}

// ── LOAD ──
async function loadAll() {
  await Promise.all([loadVacancies(), loadPosts('news'), loadPosts('contest'), loadSettings()]);
}

let editingVacancyId = null;

async function loadVacancies() {
  const list = await fetch(API + '/api/vacancies').then(r => r.json()).catch(() => []);
  window.vacancies = list;
  const el = document.getElementById('vacancy-list');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Вакансій поки немає</div>'; return; }
  el.innerHTML = list.map(v => `
    <div class="item-card">
      <div class="item-thumb" style="font-size:26px;display:flex;align-items:center;justify-content:center">${v.emoji}</div>
      <div class="item-info">
        <div class="item-title">${v.title}</div>
        <div class="item-sub">${v.desc.substring(0,70)}...</div>
      </div>
      <button class="btn-edit" onclick="editVacancy(vacancies.find(x=>x._id==='${v._id}'))">Редагувати</button>
      <button class="btn-del" onclick="delVacancy('${v._id}')">Видалити</button>
    </div>`).join('');
}


function editVacancy(v) {
  editingVacancyId = v._id;
  document.getElementById('v-title').value = v.title;
  document.getElementById('v-emoji').value = v.emoji;
    document.getElementById('v-image').value = v.image || '';
  
  // показати бейдж
  let badge = document.getElementById('editing-badge-v');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'editing-badge-v';
    badge.className = 'editing-badge';
    document.querySelector('#tab-vacancies .form-card h3').after(badge);
  }
  badge.textContent = '✏️ Режим редагування: ' + v.title;
  badge.style.display = 'block';
  document.querySelector('#tab-vacancies .btn-submit').textContent = 'Зберегти зміни';
  window.scrollTo(0,0);
}

let editingPostId = null;

async function loadPosts(type) {
  const list = await fetch(API + '/api/posts?type=' + type).then(r => r.json()).catch(() => []);
  window.posts = (window.posts || []).filter(p => p.type !== type).concat(list);
  const el = document.getElementById(type === 'news' ? 'news-list' : 'contest-list');
  const label = type === 'news' ? 'новин' : 'конкурсів';
  if (!list.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">${type==='news'?'📰':'🏆'}</div>Поки немає ${label}</div>`; return; }
  el.innerHTML = list.map(p => `
    <div class="item-card">
      <div class="item-thumb">${p.image ? `<img src="${p.image}" alt="">` : (type==='news'?'📰':'🏆')}</div>
      <div class="item-info">
        <div class="item-title">${p.title}</div>
        <div class="item-sub">${p.date ? fmtDate(p.date) : ''} ${p.text ? '· '+p.text.substring(0,50)+'...' : ''}</div>
      </div>
      <button class="btn-edit" onclick="editPost(posts.find(x=>x._id==='${p._id}'))">Редагувати</button>
      <button class="btn-del" onclick="delPost('${p._id}','${type}')">Видалити</button>
    </div>`).join('');
}

function editPost(p) {
  editingPostId = p._id;
  const isNews = p.type === 'news';
  const tab = isNews ? 'news' : 'contests';
  const tabBtn = Array.from(document.querySelectorAll('.nav-item, .mob-tab'))
  .find(b => b.onclick && b.onclick.toString().includes(tab));
switchTab(tab, tabBtn || document.querySelector('.nav-item'));
  document.getElementById(isNews ? 'n-title' : 'ct-title').value = p.title;
  document.getElementById(isNews ? 'n-text'  : 'ct-text').value = p.text || '';
  document.getElementById(isNews ? 'n-date'  : 'ct-date').value = p.date || '';
  document.getElementById(isNews ? 'n-image' : 'ct-image').value = p.image || '';
  
  const badgeId = 'editing-badge-' + tab;
  let badge = document.getElementById(badgeId);
  if (!badge) {
    badge = document.createElement('div');
    badge.id = badgeId;
    badge.className = 'editing-badge';
    document.querySelector('#tab-' + tab + ' .form-card h3').after(badge);
  }
  badge.textContent = '✏️ Режим редагування: ' + p.title;
  badge.style.display = 'block';
  document.querySelector('#tab-' + tab + ' .btn-submit').textContent = 'Зберегти зміни';
  window.scrollTo(0,0);
}

async function loadSettings() {
  const s = await fetch(API + '/api/settings').then(r => r.json()).catch(() => ({}));
  document.getElementById('s-phone').value = s.phone || '';
  document.getElementById('s-email').value = s.email || '';
  document.getElementById('s-addr').value = s.address || '';
  document.getElementById('s-hours').value = s.hours || '';
  document.getElementById('s-years').value = s.years || '';
  document.getElementById('s-staff').value = s.staff || '';
}

// ── ACTIONS ──
async function addVacancy() {
  const title   = document.getElementById('v-title').value.trim();
  const emoji   = document.getElementById('v-emoji').value.trim() || '💼';
  const desc    = document.getElementById('v-desc').value.trim();
  const details = document.getElementById('v-details').value.trim();
  const imageLink = document.getElementById('v-image').value.trim();
  
  if (!title || !desc) return showToast('Заповніть назву і опис', true);

  const btn = event.target;
  btn.disabled = true;
  try {
    
    const url = editingVacancyId
      ? API + '/api/vacancies/' + editingVacancyId
      : API + '/api/vacancies';
    const method = editingVacancyId ? 'PUT' : 'POST';

    const body = { title, emoji, desc, details };
if (imageLink) body.image = imageLink;
const r = await fetch(url, {
  method,
  headers: { 'Content-Type': 'application/json', ...authHeader() },
  body: JSON.stringify(body)
});
    if (!r.ok) throw new Error();

    // скинути форму
    editingVacancyId = null;
    document.getElementById('v-title').value = '';
    document.getElementById('v-emoji').value = '';
    document.getElementById('v-desc').value = '';
    document.getElementById('v-details').value = '';
    // стало:
document.getElementById('v-image').value = '';
    const badge = document.getElementById('editing-badge-v');
    if (badge) badge.style.display = 'none';
    btn.textContent = 'Додати вакансію';
    await loadVacancies();
    showToast('✓ Збережено');
  } catch { showToast('Помилка збереження', true); }
  btn.disabled = false;
}

async function addPost(type) {
  const isNews = type === 'news';
  const title  = document.getElementById(isNews ? 'n-title' : 'ct-title').value.trim();
  const text   = document.getElementById(isNews ? 'n-text'  : 'ct-text').value.trim();
  const date   = document.getElementById(isNews ? 'n-date'  : 'ct-date').value;
  const imageLink = document.getElementById(isNews ? 'n-image' : 'ct-image').value.trim();
  
  if (!title) return showToast('Введіть заголовок', true);

  const btn = event.target;
  btn.disabled = true;
  try {
    
    const url = editingPostId
      ? API + '/api/posts/' + editingPostId
      : API + '/api/posts';
    const method = editingPostId ? 'PUT' : 'POST';

    const body = { type, title, text, date };
if (imageLink) body.image = imageLink;
const r = await fetch(url, {
  method,
  headers: { 'Content-Type': 'application/json', ...authHeader() },
  body: JSON.stringify(body)
});
    if (!r.ok) throw new Error();

    editingPostId = null;
    document.getElementById(isNews ? 'n-title' : 'ct-title').value = '';
    document.getElementById(isNews ? 'n-text'  : 'ct-text').value = '';
    document.getElementById(isNews ? 'n-date'  : 'ct-date').value = '';
    // стало:
document.getElementById(isNews ? 'n-image' : 'ct-image').value = '';
    const tab = isNews ? 'news' : 'contests';
    const badge = document.getElementById('editing-badge-' + tab);
    if (badge) badge.style.display = 'none';
    btn.textContent = isNews ? 'Додати новину' : 'Додати конкурс';
    await loadPosts(type);
    showToast('✓ Збережено');
  } catch { showToast('Помилка збереження', true); }
  btn.disabled = false;
}

async function delVacancy(id) {
  if (!confirm('Видалити цю вакансію?')) return;
  await fetch(API + '/api/vacancies/' + id, {method:'DELETE', headers:authHeader()});
  await loadVacancies();
  showToast('Видалено');
}

async function delPost(id, type) {
  if (!confirm('Видалити?')) return;
  await fetch(API + '/api/posts/' + id, {method:'DELETE', headers:authHeader()});
  await loadPosts(type);
  showToast('Видалено');
}

async function saveSettings() {
  const btn = event.target;
  btn.disabled = true;
  try {
    await fetch(API + '/api/settings', {
      method: 'POST',
      headers: {'Content-Type':'application/json', ...authHeader()},
      body: JSON.stringify({
        phone:   document.getElementById('s-phone').value,
        email:   document.getElementById('s-email').value,
        address: document.getElementById('s-addr').value,
        hours:   document.getElementById('s-hours').value,
        years:   document.getElementById('s-years').value,
        staff:   document.getElementById('s-staff').value,
      })
    });
    showToast('✓ Налаштування збережено');
  } catch { showToast('Помилка', true); }
  btn.disabled = false;
}
</script>
